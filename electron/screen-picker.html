<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select source</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Segoe UI', sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #071638, #06122d);
        color: #e8f2ff;
      }
      .app {
        padding: 14px;
      }
      .header {
        border-bottom: 1px solid rgba(92, 134, 191, 0.35);
        margin-bottom: 12px;
      }
      .status {
        color: #9cc0ea;
        margin: 6px 0 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .section {
        display: grid;
        gap: 10px;
        align-content: start;
        border-top: 1px solid rgba(92, 134, 191, 0.35);
        padding-top: 12px;
      }
      .section.application-window .source-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .section h2 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.03em;
        color: #9ec6ef;
        text-transform: uppercase;
      }
      .source-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 10px;
      }
      .browser-layout {
        display: grid;
      }
      .card {
        width: 100%;
        border: 1px solid rgba(92, 134, 191, 0.3);
        border-radius: 12px;
        background: rgba(10, 30, 65, 0.92);
        padding: 8px;
        text-align: left;
        display: grid;
        gap: 8px;
      }
      .thumb {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 8px;
        background: rgba(3, 10, 24, 0.86);
      }
      .meta {
        display: grid;
        gap: 3px;
      }
      .meta strong {
        font-size: 13px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.35;
        min-height: calc(1.35em * 2);
      }
      .meta span {
        color: #98b7dc;
        font-size: 11px;
      }
      .empty {
        border: 1px dashed rgba(92, 134, 191, 0.45);
        border-radius: 10px;
        padding: 16px;
        color: #9ab7da;
      }
      @media (max-width: 980px) {
        .browser-layout .source-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      @media (max-width: 760px) {
        .source-grid {
          grid-template-columns: 1fr;
        }
        .browser-layout .source-grid {
          grid-template-columns: 1fr;
        }
        .section.application-window .source-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header"></div>
      <div id="grid" class="grid"></div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search)
      const requestId = params.get('requestId') || ''
      const grid = document.getElementById('grid')
      let refreshTimer = null

      const BROWSER_NAME_PATTERN = /(chrome|edge|firefox|brave|opera|safari|coccoc|browser)/i
      const BROWSER_TAB_PATTERN = /(tab|new tab|incognito tab|private tab)/i

      const escapeHtml = (text) =>
        String(text || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')

      const groupSources = (sources) => {
        const groups = {
          entireScreen: [],
          allWindows: [],
          browwerWindow: [],
          browwerTab: [],
          applicationWindow: [],
        }

        for (const source of sources) {
          if (source.kind === 'screen') {
            groups.entireScreen.push(source)
            continue
          }

          groups.allWindows.push(source)

          if (BROWSER_NAME_PATTERN.test(String(source.name || ''))) {
            if (BROWSER_TAB_PATTERN.test(String(source.name || ''))) {
              groups.browwerTab.push(source)
            } else {
              groups.browwerWindow.push(source)
            }
            continue
          }

          groups.applicationWindow.push(source)
        }

        return groups
      }

      const renderCards = (sources, kindLabel) =>
        sources
          .map((source) => {
            const name = escapeHtml(source.name)
            const kind = kindLabel || source.__label || (source.kind === 'screen' ? 'Display' : 'Window')
            const thumb = source.thumbnailDataUrl
              ? `<img class="thumb" src="${source.thumbnailDataUrl}" alt="${name}" />`
              : '<div class="thumb"></div>'
            return `<button class="card" type="button" data-source-id="${escapeHtml(source.id)}">${thumb}<div class="meta"><strong>${name}</strong><span>${kind}</span></div></button>`
          })
          .join('')

      const renderSection = (title, sources, sectionClass = '') => {
        if (!sources.length) {
          return `<section class="section ${sectionClass}"><h2>${title}</h2><div class="empty">No source available.</div></section>`
        }

        return `<section class="section ${sectionClass}"><h2>${title}</h2><div class="source-grid">${renderCards(sources)}</div></section>`
      }

      const renderBrowserSection = (browserWindows, browserTabs) => {
        const browserItems = [
          ...browserWindows.map((item) => ({ ...item, __label: 'Window' })),
          ...browserTabs.map((item) => ({ ...item, __label: 'Brower Tab' })),
        ]

        if (!browserItems.length) {
          return `<section class="section"><h2>Brower</h2><div class="empty">No browser source.</div></section>`
        }

        return `<section class="section"><h2>Brower</h2><div class="browser-layout"><div class="source-grid">${renderCards(browserItems, '')}</div></div></section>`
      }

      const render = (sources) => {
        if (!Array.isArray(sources) || sources.length === 0) {
          grid.innerHTML = '<div class="empty">No screen/window source found.</div>'
          return
        }

        const groups = groupSources(sources)
        grid.innerHTML = [
          renderSection('Entire Screen', groups.entireScreen),
          renderBrowserSection(groups.browwerWindow, groups.browwerTab),
          renderSection('Applicatin Window', groups.allWindows, 'application-window'),
        ].join('')
      }

      grid.addEventListener('click', (event) => {
        const card = event.target.closest('.card')
        if (!card) return
        const sourceId = card.getAttribute('data-source-id')
        if (!sourceId) return
        window.screenPickerAPI.select(requestId, sourceId)
      })

      window.screenPickerAPI.onSources((payload) => {
        if (!payload || payload.requestId !== requestId) return
        render(payload.sources || [])
      })

      refreshTimer = window.setInterval(() => {
        window.screenPickerAPI.ready(requestId)
      }, 1500)

      window.addEventListener('beforeunload', () => {
        if (refreshTimer) {
          window.clearInterval(refreshTimer)
          refreshTimer = null
        }
      })

      window.screenPickerAPI.ready(requestId)
    </script>
  </body>
</html>
