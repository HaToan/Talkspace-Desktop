<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select source</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Segoe UI', sans-serif;
        --cw-bg: #756797;
        --cw-card: rgba(12, 16, 20, 0.78);
        --cw-card-strong: rgba(10, 13, 17, 0.92);
        --cw-border: rgba(118, 144, 160, 0.14);
        --cw-border-strong: rgba(99, 210, 198, 0.28);
        --cw-text: #f1f6fb;
        --cw-text-muted: #aab7c8;
        --cw-accent: #63d2c6;
        --cw-accent-2: #56b7ff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--cw-bg);
        color: var(--cw-text);
      }
      .app {
        padding: 16px;
      }
      .status {
        color: #9cc0ea;
        margin: 6px 0 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .section {
        display: grid;
        gap: 12px;
        align-content: start;
        padding: 12px;
        border: 1px solid rgba(203, 214, 226, 0.38);
        border-radius: 12px;
        background: rgba(44, 50, 66, 0.72);
        backdrop-filter: blur(10px);
      }
      .section.section--entire {
        border-color: rgba(190, 201, 214, 0.22);
        background: rgba(40, 45, 58, 0.48);
      }
      .section.section--browser {
        border-color: rgba(190, 201, 214, 0.22);
        background: rgba(40, 45, 58, 0.48);
      }
      .section.section--application {
        border-color: rgba(190, 201, 214, 0.22);
        background: rgba(40, 45, 58, 0.48);
      }
      .section h2 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.03em;
        color: #ecf2fa;
        text-transform: uppercase;
      }
      .section.section--entire h2 {
        color: #c9d5e4;
      }
      .section.section--browser h2 {
        color: #c9d5e4;
      }
      .section.section--application h2 {
        color: #c4d1e1;
      }
      .section.section--entire .card,
      .section.section--browser .card,
      .section.section--application .card {
        border-color: rgba(188, 200, 214, 0.22);
        background: rgba(34, 40, 53, 0.54);
      }
      .source-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
      }
      .browser-layout {
        display: grid;
      }
      .card {
        width: 100%;
        border: 1px solid rgba(205, 216, 228, 0.4);
        border-radius: 10px;
        background: rgba(39, 46, 60, 0.82);
        padding: 8px;
        text-align: left;
        display: grid;
        gap: 8px;
      }
      .thumb {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 8px;
        background: rgba(27, 34, 47, 0.74);
      }
      .meta {
        display: grid;
        gap: 3px;
      }
      .meta strong {
        font-size: 13px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.35;
        min-height: calc(1.35em * 2);
      }
      .empty {
        border: 1px dashed rgba(205, 216, 228, 0.42);
        border-radius: 10px;
        padding: 16px;
        background: rgba(40, 47, 61, 0.72);
        color: #cfdbeb;
      }
      .section.section--entire .empty {
        border-color: rgba(190, 201, 214, 0.26);
        background: rgba(35, 41, 54, 0.5);
        color: #b8c6d9;
      }
      .section.section--browser .empty {
        border-color: rgba(190, 201, 214, 0.26);
        background: rgba(35, 41, 54, 0.5);
        color: #b8c6d9;
      }
      .section.section--application .empty {
        border-color: rgba(190, 201, 214, 0.26);
        background: rgba(35, 41, 54, 0.5);
        color: #b8c6d9;
      }
      @media (max-width: 760px) {
        .source-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="grid" class="grid"></div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search)
      const requestId = params.get('requestId') || ''
      const grid = document.getElementById('grid')
      let refreshTimer = null

      const BROWSER_NAME_PATTERN = /(chrome|edge|firefox|brave|opera|safari|coccoc|browser)/i
      const BROWSER_TAB_PATTERN = /(tab|new tab|incognito tab|private tab)/i

      const escapeHtml = (text) =>
        String(text || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')

      const groupSources = (sources) => {
        const groups = {
          entireScreen: [],
          browserWindow: [],
          browserTab: [],
          applicationWindow: [],
        }

        for (const source of sources) {
          if (source.kind === 'screen') {
            groups.entireScreen.push(source)
            continue
          }

          if (BROWSER_NAME_PATTERN.test(String(source.name || ''))) {
            if (BROWSER_TAB_PATTERN.test(String(source.name || ''))) {
              groups.browserTab.push(source)
            } else {
              groups.browserWindow.push(source)
            }
            continue
          }

          groups.applicationWindow.push(source)
        }

        return groups
      }

      const renderCards = (sources) =>
        sources
          .map((source) => {
            const name = escapeHtml(source.name)
            const thumb = source.thumbnailDataUrl
              ? `<img class="thumb" src="${source.thumbnailDataUrl}" alt="${name}" />`
              : '<div class="thumb"></div>'
            return `<button class="card" type="button" data-source-id="${escapeHtml(source.id)}">${thumb}<div class="meta"><strong>${name}</strong></div></button>`
          })
          .join('')

      const renderSection = (title, sources, sectionClass = '') => {
        if (!sources.length) {
          return `<section class="section ${sectionClass}"><h2>${title}</h2><div class="empty">No source available.</div></section>`
        }

        return `<section class="section ${sectionClass}"><h2>${title}</h2><div class="source-grid">${renderCards(sources)}</div></section>`
      }

      const renderBrowserSection = (browserWindows, browserTabs) => {
        const browserItems = [...browserWindows, ...browserTabs]

        if (!browserItems.length) {
          return `<section class="section section--browser"><h2>Browser</h2><div class="empty">No browser source.</div></section>`
        }

        return `<section class="section section--browser"><h2>Browser</h2><div class="browser-layout"><div class="source-grid">${renderCards(browserItems)}</div></div></section>`
      }

      const render = (sources) => {
        if (!Array.isArray(sources) || sources.length === 0) {
          grid.innerHTML = '<div class="empty">No screen/window source found.</div>'
          return
        }

        const groups = groupSources(sources)
        grid.innerHTML = [
          renderSection('Entire Screen', groups.entireScreen, 'section--entire'),
          renderBrowserSection(groups.browserWindow, groups.browserTab),
          renderSection('Application Windows', groups.applicationWindow, 'application-window section--application'),
        ].join('')
      }

      grid.addEventListener('click', (event) => {
        const card = event.target.closest('.card')
        if (!card) return
        const sourceId = card.getAttribute('data-source-id')
        if (!sourceId) return
        window.screenPickerAPI.select(requestId, sourceId)
      })

      window.screenPickerAPI.onSources((payload) => {
        if (!payload || payload.requestId !== requestId) return
        render(payload.sources || [])
      })

      refreshTimer = window.setInterval(() => {
        window.screenPickerAPI.ready(requestId)
      }, 1500)

      window.addEventListener('beforeunload', () => {
        if (refreshTimer) {
          window.clearInterval(refreshTimer)
          refreshTimer = null
        }
      })

      window.screenPickerAPI.ready(requestId)
    </script>
  </body>
</html>
