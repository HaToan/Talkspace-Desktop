appId: com.vxspace.talkspace-desktop
productName: TalkSpace
protocols:
  - name: TalkSpace Desktop
    schemes:
      - talkspace-desktop
directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - node_modules/ffmpeg-static/**/*

asarUnpack:
  - "**/node_modules/ffmpeg-static/**"

win:
  target:
    - target: nsis
      arch: [x64, ia32]
  artifactName: TalkSpace-Setup-${version}-${arch}.exe

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: TalkSpace-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false

linux:
  target:
    - target: AppImage
      arch: [x64]
  artifactName: TalkSpace-${version}-${arch}.AppImage
  category: Network

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: generic
  url: https://v-xs.com/software.x/talkspace/
